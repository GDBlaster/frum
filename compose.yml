services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  web:
    build:
      context: ./front
      dockerfile: dockerfile
    deploy:
      replicas: 2
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./back
      dockerfile: dockerfile
    env_file: "db.env"
    deploy:
      replicas: 2
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  db:
    image: mariadb
    env_file: "db.env"
    volumes:
      - ./.db:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
