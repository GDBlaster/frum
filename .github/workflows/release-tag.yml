name: Publish Release Image

on:
  release:
    types: [published]

jobs:
  publish-back:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          TAG_NAME=${{ github.ref_name }}
          SHA=${{ github.sha }}
          IMAGE_ID=ghcr.io/gdblaster/frum/back

          docker build -t $IMAGE_ID:$TAG_NAME -t $IMAGE_ID:latest -t $IMAGE_ID:$SHA ./back

          docker push $IMAGE_ID:$TAG_NAME
          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:$SHA

      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_LATEST }}"

  publish-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          TAG_NAME=${{ github.ref_name }}
          SHA=${{ github.sha }}
          IMAGE_ID=ghcr.io/gbdblaster/frum/front

          docker build -t $IMAGE_ID:$TAG_NAME -t $IMAGE_ID:latest -t $IMAGE_ID:$SHA ./front

          docker push $IMAGE_ID:$TAG_NAME
          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:$SHA

  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy sql setup script to release
        run: cp ./db ./release/

      - name: Interpolate image tags
        run: sed -i "s/__VERSION__/${{ github.ref_name }}/g" release/compose.yml

      - name: Zip release folder
        run: zip -r "release-${{ github.ref_name }}.zip" release/

      - name: Upload Zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
