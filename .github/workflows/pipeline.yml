name: Code Check and deployment

on:
  pull_request:

jobs:
  Prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Prettier
        run: npm install --save-dev prettier

      - name: Prettier Check
        run: npx prettier . --check

  Python-Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install linting tools
        run: pip install black ruff

      - name: Formating
        run: black . --check

      - name: Lint
        run: ruff check .

  docker-build-front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        run: |
          docker build -t frum-front:${{ github.sha }} ./front
          docker save -o front.tar "frum-front:${{ github.sha }}"

      - name: upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: "front-image-${{github.sha}}"
          path: front.tar
          retention-days: 1
          overwrite: true

  docker-build-back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        run: |
          docker build -t frum-back:${{ github.sha }} ./back
          docker save -o back.tar "frum-back:${{ github.sha }}"

      - name: upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: "back-image-${{github.sha}}"
          path: back.tar
          retention-days: 1
          overwrite: true

  docker-scan-front:
    needs: docker-build-front
    runs-on: ubuntu-latest
    steps:
      - name: import artifact
        uses: actions/download-artifact@v8
        with:
          name: "front-image-${{github.sha}}"

      - name: import image
        run: docker load -i front.tar

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "frum-front:${{ github.sha }}"
          format: "table"
          exit-code: 1
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  docker-scan-back:
    needs: docker-build-back
    runs-on: ubuntu-latest
    steps:
      - name: import artifact
        uses: actions/download-artifact@v8
        with:
          name: "back-image-${{github.sha}}"

      - name: import image
        run: docker load -i back.tar

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "frum-back:${{ github.sha }}"
          format: "table"
          exit-code: 1
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  dast-wapiti:
    needs: [ docker-build-front, docker-build-back ]
    runs-on: ubuntu-latest
    steps:
      - name: Download Front Image
        uses: actions/download-artifact@v4
        with:
          name: "front-image-${{github.sha}}"

      - name: Download Back Image
        uses: actions/download-artifact@v4
        with:
          name: "back-image-${{github.sha}}"

      - name: Load Docker Images
        run: |
          docker load -i front.tar
          docker load -i back.tar

      - name: Start Application with Docker Compose
        run: |
          # Création d'un docker-compose.yml à la volée utilisant les images chargées
          cat <<EOF > docker-compose.yml
          services:
            back:
              image: frum-back:${{ github.sha }}
              ports:
                - "5000:5000"
            front:
              image: frum-front:${{ github.sha }}
              ports:
                - "8080:80"
          EOF
          
          # Lancement en mode détaché
          docker compose up -d
          
          # Pause pour laisser les services démarrer
          sleep 10

      - name: Install Wapiti
        run: pip install wapiti3

      - name: Run Wapiti DAST Scan on Backend
        run: wapiti -u http://localhost:8000/ -f txt -o wapiti-back-report.txt

      - name: Run Wapiti DAST Scan on Frontend
        run: wapiti -u http://localhost:8080/ -f txt -o wapiti-front-report.txt

      - name: Stop Docker Compose
        if: always()
        run: docker compose down

      - name: Upload Wapiti Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wapiti-reports
          path: wapiti-*.txt
          retention-days: 7