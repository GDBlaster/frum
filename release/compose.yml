services:
  web:
    image: ghcr.io/GDBlaster/frum/front:__VERSION__
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    image: ghcr.io/GDBlaster/frum/back:__VERSION__
    env_file: "db.env"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  db:
    image: mariadb
    env_file: "db.env"
    volumes:
      - ./.db:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
