<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Nouveau sujet - Frum</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container" style="max-width: 600px; margin-top: 40px">
      <div class="mb-5 flex-between" style="align-items: center">
        <h1 style="margin: 0">Créer un nouveau sujet</h1>
        <a href="javascript:history.back()" class="btn btn-ghost">← Retour</a>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="form-new-thread" action="category.html" method="GET">
            <input type="hidden" name="id" value="1" />

            <div class="form-group">
              <label class="form-label" for="thread-title"
                >Titre du sujet</label
              >
              <input
                type="text"
                id="thread-title"
                name="title"
                class="form-control"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="thread-content">Contenu</label>
              <textarea
                id="thread-content"
                name="content"
                class="form-control"
                required
              ></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 8px">
              <a href="javascript:history.back()" class="btn btn-ghost"
                >Annuler</a
              >
              <button type="submit" class="btn btn-primary">
                Créer le sujet
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
